ht:500;text-anchor:middle;dominant-baseline:auto">Allow QtChat to send</text><text x="300" y="244" fill="#212121" font-size="12" text-anchor="middle" font-weight="500" style="fill:rgb(33, 33, 33);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:12px;font-weight:500;text-anchor:middle;dominant-baseline:auto">you notifications?</text><text x="300" y="274" fill="#424242" font-size="9" text-anchor="middle" style="fill:rgb(66, 66, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:9px;font-weight:400;text-anchor:middle;dominant-baseline:auto">So you can see new messages</text><text x="300" y="286" fill="#424242" font-size="9" text-anchor="middle" style="fill:rgb(66, 66, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:9px;font-weight:400;text-anchor:middle;dominant-baseline:auto">when QtChat is in the background.</text><rect x="238" y="310" width="124" height="24" rx="12" fill="#FFFFFF" stroke="#424242" style="fill:rgb(255, 255, 255);stroke:rgb(66, 66, 66);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="300" y="326" fill="#424242" font-size="10" text-anchor="middle" style="fill:rgb(66, 66, 66);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Allow</text><rect x="238" y="344" width="124" height="24" rx="12" fill="#FFFFFF" stroke="#9E9E9E" style="fill:rgb(255, 255, 255);stroke:rgb(158, 158, 158);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="300" y="360" fill="#9E9E9E" font-size="10" text-anchor="middle" style="fill:rgb(158, 158, 158);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Don't allow</text><text x="300" y="510" fill="#9E9E9E" font-size="11" text-anchor="middle" style="fill:rgb(158, 158, 158);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Roboto, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Figure 12 — POST_NOTIFICATIONS prompt</text></svg>